<rect x="1056" y="236" width="7" height="12" rx="1" fill="#a78bfa" opacity="0.72"/>
<rect x="1067" y="229" width="7" height="19" rx="1" fill="#a78bfa" opacity="0.68"/>
<rect x="1078" y="239" width="7" height="9" rx="1" fill="#a78bfa" opacity="0.64"/>
