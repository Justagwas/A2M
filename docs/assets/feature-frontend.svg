<text x="368.00" y="168.00" class="h" text-anchor="start">Centered frames</text>
<text x="368.00" y="194.00" class="mono" text-anchor="start">4096 samples · hop 1024</text>
<path d="M368 235 C382 220 395 248 410 231 S438 219 452 236 S480 246 494 228 S522 220 552 236" stroke="#38bdf8" stroke-width="1.6" opacity="0.55" fill="none"/>
