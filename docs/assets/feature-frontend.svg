<rect x="70.00" y="319.00" width="1395.00" height="255.00" rx="14" fill="#101d31" stroke="#2a3b55"/>
<circle cx="96" cy="356" r="16" fill="#2dd4bf" opacity="0.2"/>
<text x="96.00" y="361.00" class="label" text-anchor="middle" fill="#2dd4bf">1</text>
<text x="126.00" y="353.00" class="label" text-anchor="start">Normalize the complete frame tensor</text>
<g aria-label="z sub c t n equals x sub c t n minus global mean mu over global sample standard deviation sigma plus ten to the negative eight">
<text x="126" y="390" class="eq">z<tspan baseline-shift="sub" font-size="13">c,t,n</tspan></text>
<text x="194" y="390" class="eq">=</text>
<text x="266" y="374" class="eqSmall" text-anchor="middle">x<tspan baseline-shift="sub" font-size="11">c,t,n</tspan> &#x2212; &#x03BC;</text>
<line x1="224" y1="381" x2="308" y2="381" class="frac"/>
<text x="266" y="402" class="eqSmall" text-anchor="middle">&#x03C3; + 10<tspan baseline-shift="super" font-size="11">&#x2212;8</tspan></text>
</g>
<circle cx="776" cy="356" r="16" fill="#2dd4bf" opacity="0.2"/>
<text x="776.00" y="361.00" class="label" text-anchor="middle" fill="#2dd4bf">2</text>
<text x="806.00" y="353.00" class="label" text-anchor="start">Apply each window and an orthonormal RFFT</text>
<text x="806" y="389" class="eq" aria-label="P sub c t k w equals the squared magnitude of the real Fourier transform over sample index n of normalized samples z sub c t n times window w sub w n">P<tspan baseline-shift="sub" font-size="13">c,t,k,w</tspan><tspan baseline-shift="baseline" font-size="20"> = |RFFT</tspan><tspan baseline-shift="sub" font-size="13">n</tspan><tspan baseline-shift="baseline" font-size="20">(z</tspan><tspan baseline-shift="sub" font-size="13">c,t,n</tspan><tspan baseline-shift="baseline" font-size="20"> &#x2299; W</tspan><tspan baseline-shift="sub" font-size="13">w,n</tspan><tspan baseline-shift="baseline" font-size="20">)</tspan><tspan baseline-shift="sub" font-size="13">k</tspan><tspan baseline-shift="baseline" font-size="20">|</tspan><tspan baseline-shift="super" font-size="13">2</tspan></text>
<circle cx="96" cy="485" r="16" fill="#2dd4bf" opacity="0.2"/>
<text x="96.00" y="490.00" class="label" text-anchor="middle" fill="#2dd4bf">3</text>
<text x="126.00" y="482.00" class="label" text-anchor="start">Project frequency bins into mel bands</text>
<text x="126" y="518" class="eq" aria-label="E sub c t m w equals the sum over k of P sub c t k w times M sub k m">E<tspan baseline-shift="sub" font-size="13">c,t,m,w</tspan><tspan baseline-shift="baseline" font-size="20"> = &#x2211;</tspan><tspan baseline-shift="sub" font-size="13">k</tspan><tspan baseline-shift="baseline" font-size="20"> P</tspan><tspan baseline-shift="sub" font-size="13">c,t,k,w</tspan><tspan baseline-shift="baseline" font-size="20"> M</tspan><tspan baseline-shift="sub" font-size="13">k,m</tspan></text>
<circle cx="776" cy="485" r="16" fill="#2dd4bf" opacity="0.2"/>
<text x="776.00" y="490.00" class="label" text-anchor="middle" fill="#2dd4bf">4</text>
<text x="806.00" y="482.00" class="label" text-anchor="start">Average across channels and apply log compression</text>
<g aria-label="F sub t m w equals log of the channel mean of E plus ten to the negative five, minus log of ten to the negative five, divided by negative log of ten to the negative five">
<text x="806" y="525" class="eq">F<tspan baseline-shift="sub" font-size="13">t,m,w</tspan></text>
<text x="875" y="525" class="eq">=</text>
<text x="1145" y="508" class="eqSmall" text-anchor="middle">ln((1/C) &#x2211;<tspan baseline-shift="sub" font-size="11">c</tspan><tspan baseline-shift="baseline" font-size="17"> E</tspan><tspan baseline-shift="sub" font-size="11">c,t,m,w</tspan><tspan baseline-shift="baseline" font-size="17"> + 10</tspan><tspan baseline-shift="super" font-size="11">&#x2212;5</tspan><tspan baseline-shift="baseline" font-size="17">) &#x2212; ln(10</tspan><tspan baseline-shift="super" font-size="11">&#x2212;5</tspan><tspan baseline-shift="baseline" font-size="17">)</tspan></text>
<line x1="914" y1="516" x2="1376" y2="516" class="frac"/>
<text x="1145" y="540" class="eqSmall" text-anchor="middle">&#x2212;ln(10<tspan baseline-shift="super" font-size="11">&#x2212;5</tspan><tspan baseline-shift="baseline" font-size="17">)</tspan></text>
</g>
<text x="70.00" y="620.00" class="small" text-anchor="start">Dimensions and operations are defined by the current model bundle and piano_engine.py.</text>
<text x="1465.00" y="620.00" class="small" text-anchor="end">The source file format and original sample rate do not affect these model-facing dimensions.</text>
</svg>
