<text x="1008.00" y="168.00" class="h" text-anchor="start">Power spectra</text>
<text x="1008.00" y="194.00" class="mono" text-anchor="start">|RFFT(·)|²</text>
<line x1="1008" y1="248" x2="1192" y2="248" stroke="#2a3b55"/>
<rect x="1012" y="226" width="7" height="22" rx="1" fill="#a78bfa" opacity="0.90"/>
