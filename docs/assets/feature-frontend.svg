<rect x="1133" y="238" width="7" height="10" rx="1" fill="#a78bfa" opacity="0.44"/>
<rect x="1144" y="243" width="7" height="5" rx="1" fill="#a78bfa" opacity="0.40"/>
<rect x="1155" y="240" width="7" height="8" rx="1" fill="#a78bfa" opacity="0.36"/>
<rect x="1166" y="244" width="7" height="4" rx="1" fill="#a78bfa" opacity="0.32"/>
<rect x="1177" y="242" width="7" height="6" rx="1" fill="#a78bfa" opacity="0.28"/>
</g>
<g transform="translate(-15 0)">
<rect x="1245.00" y="132.00" width="220.00" height="132.00" rx="12" fill="#101d31" stroke="#fbbf24"/>
<text x="1263.00" y="168.00" class="h" text-anchor="start">Log-mel features</text>
<text x="1263.00" y="194.00" class="mono" text-anchor="start">T × 229 × 6</text>
<g transform="translate(1263 214)">
<rect x="0" y="0" width="17" height="7" fill="#12324b"/><rect x="19" y="0" width="17" height="7" fill="#16677a"/><rect x="38" y="0" width="17" height="7" fill="#20a9a5"/><rect x="57" y="0" width="17" height="7" fill="#e1c139"/><rect x="76" y="0" width="17" height="7" fill="#55c995"/><rect x="95" y="0" width="17" height="7" fill="#176d7e"/><rect x="114" y="0" width="17" height="7" fill="#142c45"/><rect x="133" y="0" width="17" height="7" fill="#0c192a"/><rect x="152" y="0" width="17" height="7" fill="#102239"/>
<rect x="0" y="9" width="17" height="7" fill="#0d1c2e"/><rect x="19" y="9" width="17" height="7" fill="#143a54"/><rect x="38" y="9" width="17" height="7" fill="#168391"/><rect x="57" y="9" width="17" height="7" fill="#36c8ad"/><rect x="76" y="9" width="17" height="7" fill="#f3bf29"/><rect x="95" y="9" width="17" height="7" fill="#a9c85f"/><rect x="114" y="9" width="17" height="7" fill="#248f94"/><rect x="133" y="9" width="17" height="7" fill="#153d57"/><rect x="152" y="9" width="17" height="7" fill="#0b1727"/>
<rect x="0" y="18" width="17" height="7" fill="#08111f"/><rect x="19" y="18" width="17" height="7" fill="#0f2236"/><rect x="38" y="18" width="17" height="7" fill="#154d65"/><rect x="57" y="18" width="17" height="7" fill="#19969c"/><rect x="76" y="18" width="17" height="7" fill="#7dcc82"/><rect x="95" y="18" width="17" height="7" fill="#f8bf25"/><rect x="114" y="18" width="17" height="7" fill="#c7c448"/><rect x="133" y="18" width="17" height="7" fill="#31bdb0"/><rect x="152" y="18" width="17" height="7" fill="#15556d"/>
<rect x="0" y="27" width="17" height="7" fill="#0a1525"/><rect x="19" y="27" width="17" height="7" fill="#132940"/><rect x="38" y="27" width="17" height="7" fill="#176b7d"/><rect x="57" y="27" width="17" height="7" fill="#47c9a1"/><rect x="76" y="27" width="17" height="7" fill="#dfc23a"/><rect x="95" y="27" width="17" height="7" fill="#2cb5aa"/><rect x="114" y="27" width="17" height="7" fill="#155069"/><rect x="133" y="27" width="17" height="7" fill="#11263d"/><rect x="152" y="27" width="17" height="7" fill="#0b1828"/>
</g>
</g>
<path d="M274 198 H341" class="flowTrack"/><path d="M274 198 H341" class="flow"/>
<path d="M569 198 H636" class="flowTrack"/><path d="M569 198 H636" class="flow"/>
<path d="M864 198 H931" class="flowTrack"/><path d="M864 198 H931" class="flow"/>
