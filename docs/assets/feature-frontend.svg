<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="650" viewBox="0 0 1500 650" role="img" aria-labelledby="title desc">
<title id="title">A2M feature frontend</title>
<desc id="desc">Diagram and equations for channel-aware framing, six analysis windows, real FFT power, mel projection, channel averaging, and logarithmic normalization.</desc>
<style>
.title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#edf4ff}.subtitle{font:400 14px 'Segoe UI',Arial,sans-serif;fill:#9fb0c7}
.h{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#edf4ff}.label{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#dce8f8}
.small{font:400 12px 'Segoe UI',Arial,sans-serif;fill:#9fb0c7}.tiny{font:400 10px 'Segoe UI',Arial,sans-serif;fill:#9fb0c7}
.mono{font:500 13px Consolas,'SFMono-Regular',monospace;fill:#dce8f8}.metric{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#edf4ff}
.eq{font:italic 20px 'Cambria Math','STIX Two Math','Times New Roman',serif;fill:#edf4ff}.eqSmall{font:italic 17px 'Cambria Math','STIX Two Math','Times New Roman',serif;fill:#edf4ff}
.frac{stroke:#9fb0c7;stroke-width:1.25}
.flowTrack{fill:none;stroke:#182941;stroke-width:8;stroke-linecap:round}
.flow{fill:none;stroke:#b8eaf7;stroke-width:2.5;stroke-linecap:round;filter:url(#flowGlow)}
</style>
<defs><filter id="flowGlow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1500" height="650" rx="18" fill="#08111f"/>
<text x="54.00" y="53.00" class="title" text-anchor="start">How A2M turns sound into model features</text>
<text x="54.00" y="79.00" class="subtitle" text-anchor="start">Each frame becomes six complementary spectral views across 229 mel bands</text>
